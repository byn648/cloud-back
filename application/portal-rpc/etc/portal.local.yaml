Name: portal.rpc
ListenOn: 0.0.0.0:30010
Timeout: 30000
DemoMode: false
PortalName: "Kube-Nova 云原生平台"
PortalUrl: "http://127.0.0.1:5174"

Log:
  ServiceName: portal-rpc
  Mode: "console"
  Encoding: "plain"
  TimeFormat: "2006-01-02 15:04:05"
  Path: "logs"
  Level: "info"
  MaxContentLength: 1024
  Compress: false
  Stat: true
  KeepDays: 7
  StackCooldownMillis: 100
  MaxBackups: 0
  MaxSize: 0
  Rotation: "daily"

Cache:
  Host: 127.0.0.1:6379
  Type: node
  Pass: ""
  Tls: false
  NonBlock: true
  PingTimeout: 3s

Mysql:
  DataSource: root:zmy02284310@tcp(127.0.0.1:3306)/kube_nova?charset=utf8mb4&parseTime=True&loc=Local&timeout=10s
  MaxOpenConns: 100
  MaxIdleConns: 10
  ConnMaxLifetime: 30m

DBCache:
  - Host: 127.0.0.1:6379
    Type: node
    Pass: ""
    Tls: false
    NonBlock: true
    PingTimeout: 3s

StorageConf:
  Provider: minio
  Endpoints: ["127.0.0.1:9000"]
  EndpointProxy: "http://127.0.0.1:9000"
  AccessKey: admin
  AccessSecret: password123
  BucketName: kube-nova
  CAFile: ""
  CAKey: ""
  UseTLS: false

AuthConfig:
  AccessSecret: zk5Lp8m+0g7lvvLcnbUHPzQFEsRAmvNIn9tXdx0o80U=
  AccessExpire: 86400
  RefreshSecret: zk5Lp8m+0g7lvvLcnbUHPzQFEsRAmvNIn9tXdx0o80U=
  RefreshExpire: 604800
  RefreshAfter: 604800

Aggregator:
  Enabled: false
  MaxBufferSize: 1000
  GlobalBufferWindow: 30s
  SeverityWindows:
    Critical: 0s
    Warning: 1m
    Info: 1m
    Default: 1m

LeaderElection:
  Enabled: false
  LeaseName: portal-rpc-aggregator-leader
  LeaseNamespace: kube-nova
  LeaseDuration: 15s
  RenewDeadline: 10s
  RetryPeriod: 2s
