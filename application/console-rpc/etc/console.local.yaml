Name: console.rpc
ListenOn: 0.0.0.0:30018
Timeout: 30000

Log:
  ServiceName: console-rpc
  Mode: "console"
  Encoding: "plain"
  TimeFormat: "2006-01-02 15:04:05"
  Path: "logs"
  Level: "info"
  MaxContentLength: 1024
  Compress: false
  Stat: true
  KeepDays: 7
  StackCooldownMillis: 100
  MaxBackups: 0
  MaxSize: 0
  Rotation: "daily"

Cache:
  Host: 127.0.0.1:6379
  Type: node
  Pass: ""
  Tls: false
  NonBlock: true
  PingTimeout: 3s

Mysql:
  DataSource: root:121866999@tcp(127.0.0.1:3306)/kube_nova?charset=utf8mb4&parseTime=True&loc=Local&timeout=10s
  MaxOpenConns: 100
  MaxIdleConns: 10
  ConnMaxLifetime: 30m

DBCache:
  - Host: 127.0.0.1:6379
    Type: node
    Pass: ""
    Tls: false
    NonBlock: true
    PingTimeout: 3s

ManagerRpc:
  Endpoints:
    - 127.0.0.1:30011
  NonBlock: true
  Timeout: 30000
